services:
  db:
    image: postgres:16-alpine
    container_name: roberto-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: roberto
      POSTGRES_PASSWORD: roberto
      POSTGRES_DB: roberto
    ports:
      - "5432:5432"
    volumes:
      - roberto_pgdata:/var/lib/postgresql/data

volumes:
  roberto_pgdata:
